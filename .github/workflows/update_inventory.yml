name: Update VR Inventory
on:
  repository_dispatch:
    types: [check-out]
jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VR_TOKEN }}

      - name: Update Inventory JSON
        env:
          DEVICE_ID: "${{ github.event.client_payload.device_id }}"
          STATUS: "${{ github.event.client_payload.status }}"
          EVENT: "${{ github.event.client_payload.event }}"
        run: |
          python3 -c "
          import json, os
          did = os.environ.get('DEVICE_ID')
          status = os.environ.get('STATUS')
          event = os.environ.get('EVENT')
          with open('vr_inventory.json', 'r') as f:
              data = json.load(f)
          for item in data:
              if item.get('id') == did:
                  item['status'] = status
                  item['last_event'] = event
          with open('vr_inventory.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Commit and Push
        env:
          DEVICE_ID: "${{ github.event.client_payload.device_id }}"
          STATUS: "${{ github.event.client_payload.status }}"
        run: |
          git config --global user.name "VR-Bot"
          git config --global user.email "bot@vr-tracker.com"
          git add vr_inventory.json
          git commit -m "Automated Status Update: $DEVICE_ID to $STATUS"
          git push
