name: Update VR Inventory
on:
  repository_dispatch:
    types: [check-out]
jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VR_TOKEN }}

      - name: Update Inventory JSON
        run: |
          DEVICE_ID="${{ github.event.client_payload.device_id }}"
          PERSON="${{ github.event.client_payload.person }}"
          EVENT="${{ github.event.client_payload.event }}"
          LOCATION="${{ github.event.client_payload.location }}"
          
          # Use Python to surgically update the JSON
          python3 -c "
          import json, os
          with open('vr_inventory.json', 'r') as f:
              data = json.load(f)
          for item in data:
              if item.get('id') == '$DEVICE_ID':
                  item['status'] = 'Not Available'
                  item['last_event'] = f'$EVENT @ $LOCATION (By: $PERSON)'
          with open('vr_inventory.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "VR-Bot"
          git config --global user.email "bot@vr-tracker.com"
          git add vr_inventory.json
          git commit -m "Automated Checkout: ${{ github.event.client_payload.device_id }}"
          git push
