<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Equipment Tracker</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --available: #22c55e;
            --not-available: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 2rem;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { color: var(--accent); margin-bottom: 0.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; width: 100%; max-width: 1100px; }
        .card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; position: relative; }
        
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 1rem; }
        .status-available { background: #14532d; color: #4ade80; }
        .status-not-available { background: #7f1d1d; color: #fca5a5; }

        .form-group { margin-top: 1rem; display: none; background: #0f172a; padding: 1rem; border-radius: 8px; border: 1px solid var(--accent); }
        input { width: 100%; padding: 0.6rem; margin: 0.4rem 0; background: #1e293b; border: 1px solid #475569; color: white; border-radius: 4px; box-sizing: border-box; }
        
        button { width: 100%; padding: 0.8rem; margin-top: 1rem; cursor: pointer; border: none; border-radius: 6px; font-weight: 700; transition: opacity 0.2s; }
        .btn-checkout { background: var(--accent); color: #0f172a; }
        .btn-submit { background: var(--available); color: #0f172a; }

        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h2 style="color: var(--accent)">Processing Selection...</h2>
        <p>Sending confirmation email from desaidev2423@gmail.com</p>
    </div>

    <h1>VR Equipment Tracker</h1>
    <p style="color: #94a3b8; margin-bottom: 2rem;">Select a headset to receive an automated confirmation email</p>

    <div class="grid" id="inventory-grid"></div>

    <script>
        // REPLACE THIS URL after you deploy your Google Apps Script
        const BRIDGE_URL = "https://script.google.com/macros/s/AKfycbzH5nY6JctezyrNsrsFIX1Nc8nvYZgUhFDF4yyHS5wz5L11RPLF0SEQOYL2Pft-G4A/exec";

        async function loadInventory() {
            const response = await fetch(`vr_inventory.json?t=${Date.now()}`);
            const data = await response.json();
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';

            data.forEach((item, index) => {
                if (!item.id) return;
                const card = document.createElement('div');
                card.className = 'card';
                const isAvail = item.status === 'Available';
                
                card.innerHTML = `
                    <div class="status-badge ${isAvail ? 'status-available' : 'status-not-available'}">${item.status}</div>
                    <div style="font-family: monospace; color: var(--accent); font-weight: bold;">${item.id}</div>
                    <h3 style="margin: 0.5rem 0">${item.model}</h3>
                    
                    ${isAvail ? `
                        <button class="btn-checkout" onclick="toggleForm(${index})">Select Device</button>
                        <div id="form-${index}" class="form-group">
                            <input type="text" id="person-${index}" placeholder="Your Name">
                            <input type="email" id="email-${index}" placeholder="Your Email (to receive confirmation)">
                            <input type="text" id="event-${index}" placeholder="Event Name">
                            <input type="text" id="loc-${index}" placeholder="Location">
                            <input type="text" id="date-${index}" placeholder="Date Required (DD/MM/YYYY)">
                            <button class="btn-submit" onclick="submitSelection(${index}, '${item.id}', '${item.model}')">Confirm Selection</button>
                        </div>
                    ` : ''}

                    <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 1rem; border-top: 1px solid #334155; padding-top: 0.5rem;">
                        <strong>Current Status:</strong> ${item.last_event || 'Available'}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleForm(index) {
            const form = document.getElementById(`form-${index}`);
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        async function submitSelection(index, deviceId, model) {
            const person = document.getElementById(`person-${index}`).value;
            const userEmail = document.getElementById(`email-${index}`).value;
            const event = document.getElementById(`event-${index}`).value;
            const loc = document.getElementById(`loc-${index}`).value;
            const date = document.getElementById(`date-${index}`).value;

            if (!person || !userEmail || !event || !loc || !date) { alert("Please fill in all fields"); return; }
            if (BRIDGE_URL === "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE") { alert("Please wait while Dev completes the setup!"); return; }

            document.getElementById('loading-overlay').style.display = 'flex';

            try {
                // Sending data to the Google Apps Script Bridge
                await fetch(BRIDGE_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify({ deviceId, model, person, userEmail, event, location: loc, date })
                });

                alert("Success! Check your email for a confirmation from desaidev2423@gmail.com.");
                location.reload();
            } catch (error) {
                console.error(error);
                alert("Error sending request. Please try again later.");
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        loadInventory();
    </script>
</body>
</html>
